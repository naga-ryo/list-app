<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta property="og:description" content="" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>みんなの買い物リスト</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="toast" class="toast hidden"></div>

  <div id="login-view" class="view hidden">
    <div class="login-container">
      <div class="login-logo">🛒</div>
      <h1>みんなの買い物リスト</h1>
      <p>パスワードを入力してスタート</p>
      <input type="password" id="password-input" placeholder="パスワードを入力">
      <button id="login-btn" class="primary-btn">ログイン</button>
    </div>
  </div>

  <div id="main-view" class="view hidden">
    <header>
      <div class="header-title">
        <h1>買い物リスト</h1>
        <p id="user-badge" class="user-badge"></p>
      </div>
      <button id="go-trash-btn" class="icon-btn">🗑️ ゴミ箱</button>
    </header>
    <div class="notice-bar">項目をタップすると、品物を追加・確認・削除できます</div>
    <div class="content" id="category-list"></div>
  </div>

  <div id="detail-view" class="view hidden">
    <header>
      <button id="back-btn" class="icon-btn">◀ 戻る</button>
      <h1 id="detail-title">カテゴリ名</h1>
      <button id="edit-mode-btn" class="secondary-btn">編集</button>
    </header>
    
    <div id="edit-actions" class="edit-actions hidden">
      <label class="select-all-label">
        <input type="checkbox" id="select-all-chk"> すべて選択
      </label>
      <span id="selected-count">0件選択中</span>
      <button id="delete-selected-btn" class="danger-btn">ゴミ箱へ移動</button>
    </div>

    <div class="content" id="item-list"></div>

    <div id="add-form" class="add-form">
      <input type="text" id="new-item-name" placeholder="品物を入力...">
      <div class="qty-control">
        <button id="qty-minus">-</button>
        <span id="qty-display">1</span>
        <button id="qty-plus">+</button>
      </div>
      <button id="add-btn" class="primary-btn">追加</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
